<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 400px;
            height: 500px;
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #0f172a;
            border-radius: 8px;
        }

        .msg {
            margin: 8px 0;
            padding: 8px 10px;
            border-radius: 8px;
            max-width: 70%;
        }

        .user {
            background: #38bdf8;
            color: black;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #22c55e;
            color: black;
            margin-right: auto;
            text-align: left;
        }

        form {
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            margin-left: 5px;
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🤖 Aura</h1>

    <div class="chat">
        {% for sender, msg in chat %}
            {% if sender == "You" %}
                <div class="msg user">{{ msg }}</div>
            {% else %}
                {% for replies in msg%}
                    <div class="msg bot">{{ replies }}</div>
                {% endfor %}
            {% endif %}
        {% endfor %}
    </div>

    <form method="POST">
        <input type="text" name="msg" placeholder="Type something..." required>
        <button type="submit">Send</button>
    </form>
</div>

</body>
</html>
